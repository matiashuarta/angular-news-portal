<div class="admin-container">

  <!-- ── Form ── -->
  <div class="form-card">
    <h2>{{ isEditMode ? 'Edit Article' : 'Create New Article' }}</h2>
    <form (ngSubmit)="saveNews()">

      <div class="form-group">
        <label>Title</label>
        <input type="text" [(ngModel)]="title" name="title" required />
      </div>

      <div class="form-group">
        <label>Subtitle</label>
        <input type="text" [(ngModel)]="subtitle" name="subtitle" />
      </div>

      <div class="form-group">
        <label>Category</label>
        <select [(ngModel)]="category" name="category">
          <option value="Multi">Multi</option>
          <option value="PC">PC</option>
          <option value="Xbox">Xbox</option>
          <option value="Playstation">Playstation</option>
          <option value="Nintendo">Nintendo</option>
          <option value="Mobile">Mobile</option>
          <option value="Esports">Esports</option>
        </select>
      </div>

      <div class="form-group">
        <label>News Type</label>
        <select [(ngModel)]="newsType" name="newsType">
          <option value="Top News">Top News</option>
          <option value="Other News">Other News</option>
          <option value="Vertical News">Vertical News</option>
        </select>
      </div>

      <div class="form-group form-group--inline">
        <label>
          <input type="checkbox" [(ngModel)]="isTopNews" name="isTopNews" />
          Top News (appears in hero section)
        </label>
      </div>

      <div class="form-group">
        <label>Image Path <span class="hint">(e.g. assets/image.jpg)</span></label>
        <input type="text" [(ngModel)]="image" name="image" />
      </div>

      <div class="form-group">
        <label>Body</label>
        <textarea [(ngModel)]="fullText" name="fullText" rows="7"></textarea>
      </div>

      <div class="form-group">
        <label>Related Articles <span class="hint">(shown as "you may also like" inside the article)</span></label>
        <div class="related-picker" *ngIf="allNews.length > 0">
          <div
            *ngFor="let item of allNews"
            class="related-option"
            [class.selected]="isRelated(item.id)"
            (click)="toggleRelated(item.id)"
          >
            <span class="related-check">{{ isRelated(item.id) ? '✓' : '+' }}</span>
            <span class="related-label">{{ item.title }}</span>
            <span class="related-cat">{{ item.category }}</span>
          </div>
        </div>
        <p class="hint" *ngIf="allNews.length === 0">Load the article list first.</p>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-save">{{ isEditMode ? 'Update Article' : 'Create Article' }}</button>
        <button *ngIf="isEditMode" type="button" class="btn-cancel" (click)="cancelEdit()">Cancel</button>
      </div>

    </form>
  </div>

  <!-- ── Article list ── -->
  <div class="article-list">
    <h2>Manage Articles</h2>

    <div class="list-controls">
      <input
        class="search-input"
        type="text"
        placeholder="Search articles…"
        [(ngModel)]="searchTerm"
        name="searchTerm"
        (ngModelChange)="onFilterChange()"
      />
      <select class="ctrl-select" [(ngModel)]="filterCategory" name="filterCategory" (ngModelChange)="onFilterChange()">
        <option value="All">All Categories</option>
        <option value="Multi">Multi</option>
        <option value="PC">PC</option>
        <option value="Xbox">Xbox</option>
        <option value="Playstation">Playstation</option>
        <option value="Nintendo">Nintendo</option>
        <option value="Mobile">Mobile</option>
        <option value="Esports">Esports</option>
      </select>
      <select class="ctrl-select" [(ngModel)]="sortMode" name="sortMode" (ngModelChange)="onFilterChange()">
        <option value="date-desc">Newest first</option>
        <option value="date-asc">Oldest first</option>
        <option value="alpha-asc">A → Z</option>
        <option value="alpha-desc">Z → A</option>
      </select>
    </div>

    <p *ngIf="loadingList" class="list-status">Loading…</p>
    <p *ngIf="!loadingList && filteredNews.length === 0" class="list-status">No articles found.</p>

    <div *ngFor="let item of visibleNews" class="article-row">
      <div class="article-info">
        <span class="article-title">{{ item.title }}</span>
        <span class="article-meta">{{ item.category }} · {{ item.newsType }}</span>
      </div>
      <div class="article-actions">
        <button class="btn-edit" type="button" (click)="editArticle(item)">Edit</button>
        <button class="btn-delete" type="button" (click)="deleteArticle(item.id)">Delete</button>
      </div>
    </div>

    <div class="load-more-wrap" *ngIf="hasMore">
      <button class="btn-load-more" type="button" (click)="loadMore()">
        Load more ({{ filteredNews.length - displayedCount }} remaining)
      </button>
    </div>
  </div>

</div>
