<app-category-bar [selected]="selectedCategory" (categorySelect)="selectCategory($event)"></app-category-bar>

<section class="news-section">
  <h2>Latest News</h2>
  <div class="top-news-grid">
    <div class="news-card top-news" *ngFor="let item of topNews">
      <a [routerLink]="['/news', item.id]" [queryParams]="{ isAdmin: isAdmin }">
        <img [src]="item.image" alt="News Image" />
      </a>
      <div class="card-body">
        <h3>
          <a [routerLink]="['/news', item.id]" [queryParams]="{ isAdmin: isAdmin }">
            {{ item.title }}
          </a>
        </h3>
        <p>{{ item.subtitle }}</p>
        <a [routerLink]="['/news', item.id]" [queryParams]="{ isAdmin: isAdmin }" class="read-more">Read More</a>
      </div>
    </div>
  </div>
</section>

<section class="news-section other-news-section">
  <h2>More News</h2>

  <!-- Carousel: tablet + landscape phone -->
  <div class="carousel-outer hide-on-portrait-mobile">
    <button class="carousel-btn" (click)="scrollCarousel(-1)">
      <mat-icon>chevron_left</mat-icon>
    </button>
    <div class="other-news-wrapper">
      <div class="other-news-grid" #carousel>
        <div class="news-card other-news" *ngFor="let item of otherNews">
          <a [routerLink]="['/news', item.id]" [queryParams]="{ isAdmin: isAdmin }">
            <img [src]="item.image" alt="News Image" />
          </a>
          <div class="card-body">
            <h3>
              <a [routerLink]="['/news', item.id]" [queryParams]="{ isAdmin: isAdmin }">
                {{ item.title }}
              </a>
            </h3>
            <p>{{ item.subtitle }}</p>
            <a [routerLink]="['/news', item.id]" [queryParams]="{ isAdmin: isAdmin }" class="read-more">Read More</a>
          </div>
        </div>
      </div>
    </div>
    <button class="carousel-btn" (click)="scrollCarousel(1)">
      <mat-icon>chevron_right</mat-icon>
    </button>
  </div>

  <!-- 2-col grid: portrait phone only -->
  <div class="other-news-mobile-grid show-on-portrait-mobile">
    <div class="news-card other-news" *ngFor="let item of mobileOtherNews">
      <a [routerLink]="['/news', item.id]" [queryParams]="{ isAdmin: isAdmin }">
        <img [src]="item.image" alt="News Image" />
      </a>
      <div class="card-body">
        <h3>
          <a [routerLink]="['/news', item.id]" [queryParams]="{ isAdmin: isAdmin }">
            {{ item.title }}
          </a>
        </h3>
        <p>{{ item.subtitle }}</p>
        <a [routerLink]="['/news', item.id]" [queryParams]="{ isAdmin: isAdmin }" class="read-more">Read More</a>
      </div>
    </div>
  </div>
  <div class="show-more-container show-on-portrait-mobile" *ngIf="otherNews.length > mobileOtherLimit">
    <button (click)="loadMoreMobileOther()" class="show-more-btn">Show More</button>
  </div>
</section>

<section class="news-section">
  <h2>Past News</h2>
  <div class="vertical-news-grid">
    <div class="news-card vertical-news" *ngFor="let item of displayedVerticalNews">
      <a [routerLink]="['/news', item.id]" [queryParams]="{ isAdmin: isAdmin }">
        <img [src]="item.image" alt="News Image" />
      </a>
      <div class="card-body">
        <h3>
          <a [routerLink]="['/news', item.id]" [queryParams]="{ isAdmin: isAdmin }">
            {{ item.title }}
          </a>
        </h3>
        <p>{{ item.subtitle }}</p>
        <a [routerLink]="['/news', item.id]" [queryParams]="{ isAdmin: isAdmin }" class="read-more">Read More</a>
      </div>
    </div>
  </div>
  <div class="show-more-container" *ngIf="verticalNews.length > displayedVerticalNews.length">
    <button (click)="loadMoreNews()" class="show-more-btn">Show More</button>
  </div>
</section>
